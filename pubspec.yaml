name: clawlink
description: ClawLink Windows tray client (talks to clawlink-core over named pipe).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.0-273.0.dev

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  ffi: ^2.1.3
  win32: ^5.10.0
  window_manager: ^0.4.3
  tray_manager: ^0.2.4
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.ico
    - assets/gfwlist.txt
